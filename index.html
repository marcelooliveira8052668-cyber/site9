<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Portal de Notícias</title>

  <!-- IMPORTANTE: confere o nome do arquivo -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- CONTEÚDO -->
  <main>

      <!-- MUNDO -->
      <a href="mundo.html" class="card-link">

          <h2>🌍 Mundo</h2>

        </div>

      <!-- TECNOLOGIA -->
      <a href="tecnologia.html" class="card-link">
        <div class="card">
          <h2>💻 Tecnologia</h2>
          <p>Inovações e novidades digitais</p>
        </div>
      </a>

      <!-- HISTÓRIA -->
      <a href="historia.html" class="card-link">
        <div class="card">
          <h2>📚 História</h2>
          <p>Fatos do passado e atualidades</p>
        </div>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 Portal de Notícias</p>
  </footer>
